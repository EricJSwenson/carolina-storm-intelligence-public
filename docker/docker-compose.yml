services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - STORM_LLM_BACKEND=mock-grounded

  dashboard:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: bash -c "pip install streamlit pandas plotly duckdb && streamlit run dashboards/performance_dashboard.py --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      - api
