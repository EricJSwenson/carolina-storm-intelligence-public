name: Live Data Snapshot

# Fetches a snapshot of active NOAA storms on a schedule and commits it, so the
# repo always carries recent live data. This is the automated-ingestion path:
# in production the same job would write to a warehouse/feature store instead of
# committing a file. Quiet season -> snapshot simply shows zero active storms.

on:
  schedule:
    - cron: "0 */6 * * *"     # every 6 hours
  workflow_dispatch:           # allow manual runs

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .
      - name: Fetch live snapshot
        run: python scripts/fetch_live_snapshot.py
      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live/active_storms.json
          git diff --staged --quiet || git commit -m "chore: live storm snapshot [skip ci]"
          git push
