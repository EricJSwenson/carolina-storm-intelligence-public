name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy duckdb jinja2 pyyaml pytest ruff scikit-learn
          pip install -e .
      - name: Lint
        run: ruff check src tests
      - name: Tests
        run: pytest -q
